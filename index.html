<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Thafara Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* NAV */
.nav{
  position:sticky;
  top:0;
  background:white;
  display:flex;
  justify-content:center;
  gap:15px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  z-index:10;
}

.nav button{
  background:none;
  border:none;
  font-weight:bold;
  cursor:pointer;
  padding:8px 12px;
}

.nav button.active{
  background:#16a34a;
  color:white;
  border-radius:8px;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:1000px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.item{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.06);
}

.item img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.btn{
  display:block;
  padding:10px;
  margin-top:8px;
  text-decoration:none;
  font-weight:bold;
  border-radius:10px;
}

.wa{background:#16a34a;color:white;}
.shopee{background:#ef4444;color:white;}

/* MAP */
.map{
  width:100%;
  height:300px;
  border:0;
  border-radius:12px;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button class="active" onclick="showPage('home')">Home</button>
  <button onclick="showPage('produk')">Produk</button>
  <button onclick="showPage('checkout')">Checkout</button>
  <button onclick="showPage('maps')">Maps</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">
    <h1>THAFARA STORE</h1>
    <p>Kain Kafan Lengkap & Siap Pakai</p>
  </div>
</div>

<!-- PRODUK -->
<div id="produk" class="page">
  <div class="card">
    <h2>Produk Thafara</h2>

    <div class="grid">

      <div class="item">
        <img src="produk11.jpg.jpeg">
        <h3>Paket Perempuan</h3>
        <a class="btn wa" href="https://wa.me/6285752208934">WhatsApp</a>
        <a class="btn shopee" href="https://id.shp.ee/ceqrooAD" target="_blank">Shopee</a>
      </div>

      <div class="item">
        <img src="produk12.jpg.jpeg">
        <h3>Paket Laki-laki</h3>
        <a class="btn wa" href="https://wa.me/6285752208934">WhatsApp</a>
        <a class="btn shopee" href="https://id.shp.ee/ceqrooAD" target="_blank">Shopee</a>
      </div>

    </div>
  </div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="page">
  <div class="card">
    <h2>Checkout</h2>
    <p>Tekan tombol di bawah untuk order cepat</p>

    <a class="btn wa"
       href="https://wa.me/6285752208934?text=Saya%20mau%20order%20Thafara">
      ⚡ Order via WhatsApp
    </a>
  </div>
</div>

<!-- MAPS -->
<div id="maps" class="page">
  <div class="card">
    <h2>Lokasi Kami</h2>

    <iframe class="map"
    src="https://www.google.com/maps?q=HtiU5xhVNah5xpyC7&output=embed">
    </iframe>
  </div>
</div>

<script>
function showPage(page){

  let pages = document.querySelectorAll('.page');
  pages.forEach(p=>p.classList.remove('active'));

  document.getElementById(page).classList.add('active');

  let btns = document.querySelectorAll('.nav button');
  btns.forEach(b=>b.classList.remove('active'));

  event.target.classList.add('active');
}
</script>

</body>
</html>
