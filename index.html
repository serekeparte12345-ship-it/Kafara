<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Thafara Store</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f7fb;
}

/* NAV */
.nav{
  position:sticky;
  top:0;
  background:white;
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
  z-index:10;
}

.nav button{
  background:none;
  border:none;
  font-weight:bold;
  cursor:pointer;
  padding:8px 12px;
}

.nav button.active{
  background:#16a34a;
  color:white;
  border-radius:8px;
}

/* PAGE */
.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

/* CARD */
.card{
  background:white;
  padding:20px;
  border-radius:15px;
  max-width:1000px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-top:20px;
}

.item{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,0.06);
}

/* 🔥 FIX GAMBAR DI SINI */
.item img{
  width:100%;
  aspect-ratio:1/1;   /* bikin kotak 1:1 */
  object-fit:contain; /* tampil full tanpa kepotong */
  background:#fff;    /* biar kalau ada space tetap bagus */
  padding:10px;       /* optional biar gak mepet */
}

/* BUTTON */
.btn{
  display:block;
  padding:10px;
  margin-top:8px;
  text-decoration:none;
  font-weight:bold;
  border-radius:10px;
}

.wa{background:#16a34a;color:white;}
.shopee{background:#ef4444;color:white;}
.reseller{background:#2563eb;color:white;}

/* MAP */
.map{
  width:100%;
  height:300px;
  border:0;
  border-radius:12px;
}

p{line-height:1.6}

</style>
</head>

<body>

<div class="nav">
  <button class="active" onclick="showPage('home')">Home</button>
  <button onclick="showPage('produk')">Produk</button>
  <button onclick="showPage('reseller')">Reseller</button>
  <button onclick="showPage('maps')">Maps</button>
</div>

<div id="home" class="page active">
  <div class="card">
    <h1>THAFARA STORE</h1>
    <p>Website produk perlengkapan kafan berkualitas.</p>
  </div>
</div>

<div id="produk" class="page">
  <div class="card">
    <h2>Katalog Produk</h2>

    <div class="grid">

      <div class="item">
        <img src="produk11.jpg.jpeg">
        <h3>Perempuan</h3>
        <a class="btn wa" href="#">WhatsApp</a>
      </div>

      <div class="item">
        <img src="produk12.jpg.jpeg">
        <h3>Laki-laki</h3>
        <a class="btn wa" href="#">WhatsApp</a>
      </div>

      <div class="item">
        <img src="produk13.jpg.jpeg">
        <h3>Couple Paket</h3>
        <a class="btn wa" href="#">WhatsApp</a>
      </div>

    </div>
  </div>
</div>

<script>
function showPage(page){

  let pages = document.querySelectorAll('.page');
  pages.forEach(p=>p.classList.remove('active'));

  document.getElementById(page).classList.add('active');

  let btns = document.querySelectorAll('.nav button');
  btns.forEach(b=>b.classList.remove('active'));

  event.target.classList.add('active');
}
</script>

</body>
</html>
